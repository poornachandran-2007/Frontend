<div class="outstanding-container">
  <h1 class="page-title">Outstanding</h1>

  <!-- Customers Card -->
  <div class="card">
    <h2 class="card-title">Customers (Debtors) — to receive</h2>
    
    <div class="table-container">
      <table class="data-table">
        <thead>
          <tr>
            <th>Customer</th>
            <th class="align-right">Outstanding</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngIf="customers.length === 0">
            <td colspan="2" class="empty-state">Nothing due from customers.</td>
          </tr>
          <tr *ngFor="let customer of customers">
            <td>{{ customer.name }}</td>
            <td class="align-right">{{ customer.outstanding | currency:'INR' }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Suppliers Card -->
  <div class="card">
    <h2 class="card-title">Suppliers (Creditors) — to pay (Settlement)</h2>
    
    <div class="table-container">
      <table class="data-table">
        <thead>
          <tr>
            <th>Supplier</th>
            <th class="align-right">Payable</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngIf="suppliers.length === 0">
            <td colspan="2" class="empty-state">Nothing payable.</td>
          </tr>
          <tr *ngFor="let supplier of suppliers">
            <td>{{ supplier.name }}</td>
            <td class="align-right">{{ supplier.payable | currency:'INR' }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
