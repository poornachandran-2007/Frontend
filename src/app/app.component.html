<div class="app-layout">
  <!-- Left Sidebar Panel -->
  <aside class="app-sidebar" [class.collapsed]="!isSidebarExpanded" *ngIf="!isLoginPage">
    <!-- Sidebar Header -->
    <div class="sidebar-header">
      <div class="brand-logo-area">
        <div class="logo-circle">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
          </svg>
        </div>
        <div class="brand-names">
          <h2 class="brand-title">Pharmacy Books</h2>
          <span class="brand-subtitle">{{ userEmail }}</span>
        </div>
      </div>
      <button class="sidebar-toggle-btn" (click)="toggleSidebar()" title="Toggle Sidebar">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
    </div>

    <nav class="sidebar-nav">
      <ul class="nav-list">
        <li *ngFor="let item of sidebarItems" class="nav-item">
          <a class="nav-link" [class.active]="isItemActive(item)" (click)="navigate(item)"
            [title]="item.label + (item.comingSoon ? ' (Demo mode)' : '')">

            <!-- SVG Icon Selection -->
            <span class="nav-icon">
              <!-- Dashboard -->
              <svg *ngIf="item.iconName === 'dashboard'" viewBox="0 0 24 24" width="18" height="18" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="9"></rect>
                <rect x="14" y="3" width="7" height="5"></rect>
                <rect x="14" y="12" width="7" height="9"></rect>
                <rect x="3" y="16" width="7" height="5"></rect>
              </svg>

              <!-- Day Book -->
              <svg *ngIf="item.iconName === 'book'" viewBox="0 0 24 24" width="18" height="18" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
              </svg>

              <!-- Reports -->
              <svg *ngIf="item.iconName === 'reports'" viewBox="0 0 24 24" width="18" height="18" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
              </svg>

              <!-- Chart of Accounts -->
              <svg *ngIf="item.iconName === 'accounts'" viewBox="0 0 24 24" width="18" height="18" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path
                  d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 2 12 22Z"
                  stroke-width="2"></path>
                <path d="M12 6V18M6 12H18" stroke-width="2"></path>
              </svg>

              <!-- Ledgers -->
              <svg *ngIf="item.iconName === 'ledgers'" viewBox="0 0 24 24" width="18" height="18" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="8" y1="6" x2="21" y2="6"></line>
                <line x1="8" y1="12" x2="21" y2="12"></line>
                <line x1="8" y1="18" x2="21" y2="18"></line>
                <line x1="3" y1="6" x2="3.01" y2="6"></line>
                <line x1="3" y1="12" x2="3.01" y2="12"></line>
                <line x1="3" y1="18" x2="3.01" y2="18"></line>
              </svg>

              <!-- Statement -->
              <svg *ngIf="item.iconName === 'statement'" viewBox="0 0 24 24" width="18" height="18" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="9" y1="9" x2="15" y2="9"></line>
                <line x1="9" y1="13" x2="15" y2="13"></line>
                <line x1="9" y1="17" x2="13" y2="17"></line>
              </svg>

              <!-- Users -->
              <svg *ngIf="item.iconName === 'users'" viewBox="0 0 24 24" width="18" height="18" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
              </svg>

              <!-- Trial Balance -->
              <svg *ngIf="item.iconName === 'scale'" viewBox="0 0 24 24" width="18" height="18" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <circle cx="5" cy="12" r="3"></circle>
                <circle cx="19" cy="12" r="3"></circle>
              </svg>

              <!-- Profit & Loss -->
              <svg *ngIf="item.iconName === 'trending'" viewBox="0 0 24 24" width="18" height="18" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
                <polyline points="17 6 23 6 23 12"></polyline>
              </svg>

              <!-- Cheque -->
              <svg *ngIf="item.iconName === 'cheque'" viewBox="0 0 24 24" width="18" height="18" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
                <line x1="1" y1="10" x2="23" y2="10"></line>
              </svg>
            </span>

            <span class="nav-label">{{ item.label }}</span>
            <span class="demo-tag" *ngIf="item.comingSoon">Demo</span>
          </a>
        </li>
      </ul>
    </nav>

    <!-- Sidebar Footer actions -->
    <div class="sidebar-footer" *ngIf="isSidebarExpanded">
      <button class="new-voucher-btn" (click)="navigate({ label: 'Day Book', route: '/day-book', iconName: 'book' })">
        <span class="plus-icon-sidebar">+</span> New Voucher
      </button>
      <div class="signout-btn" (click)="logout()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
        <span>Sign out</span>
      </div>
    </div>
  </aside>

  <!-- Right Side Main Content View -->
  <div class="main-panel" [style.margin-left]="isLoginPage ? '0' : ''">
    <!-- Top Mobile Header Bar -->
    <header class="mobile-header" *ngIf="!isLoginPage">
      <button class="menu-toggle-btn" (click)="toggleSidebar()">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
      <div class="mobile-brand-title">Pharmacy Books</div>
    </header>

    <!-- Main Dynamic Pages wrapper -->
    <main class="page-content-wrapper">
      <router-outlet></router-outlet>
    </main>
  </div>

  <!-- Dynamic Toast Notifications -->
  <div class="toast-notification" [class.show]="toastVisible">
    <div class="toast-body">
      <div class="toast-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00ffff"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="16" x2="12" y2="12"></line>
          <line x1="12" y1="8" x2="12.01" y2="8"></line>
        </svg>
      </div>
      <div class="toast-message-content">{{ toastMessage }}</div>
    </div>
  </div>
</div>
